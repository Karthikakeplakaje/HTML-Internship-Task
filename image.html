<!doctype html>
<html>
<head>
    <title>Image Inside Table</title>
</head>
<body>

    <table border="1" cellspacing="20">
        <tr>
            <td>
                <img src="https://images.pexels.com/photos/863963/pexels-photo-863963.jpeg"
                     alt="Flower"
                     width="200"
                     height="200">
            </td>

            <td>
                <img src="https://images.pexels.com/photos/56866/garden-rose-red-pink-56866.jpeg"
                     alt="Rose"
                     width="200"
                     height="200">
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://images.pexels.com/photos/462118/pexels-photo-462118.jpeg"
                     alt="Sunflower"
                     width="200"
                     height="200">
            </td>

            <td>
                <img src="https://images.pexels.com/photos/33109/fall-autumn-red-season.jpg"
                     alt="Autumn Flower"
                     width="200"
                     height="200">
            </td>
        </tr>
    </table>

</body>
</html>
