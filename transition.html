<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height:100px;
            width:100px;
            background-color: purple;
            transition: width,height,background-color;
            transition-duration: 2s;
        }
        div:hover{
            width: 500px;
            height:500px;
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
