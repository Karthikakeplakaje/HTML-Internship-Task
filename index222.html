<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            border: 2px solid;
        }
    </style>
</head>
<body>

    <div></div>
    <button>Blue</button>

    <script>
        let button = document.querySelector("button"); // single element
        let div = document.querySelector("div");       // single element

        button.onclick = () => {
            div.style.backgroundColor = "blue";  
        }
    </script>

</body>
</html>
